name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'motion_ai/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'motion_ai/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Lint and Syntax Check
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install flake8 isort black mypy

      - name: Run Black
        run: |
          cd motion_ai
          black --check --diff . || true

      - name: Run isort
        run: |
          cd motion_ai
          isort --check-only --diff . || true

      - name: Run Flake8
        run: |
          cd motion_ai
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd motion_ai
          pip install -r requirements.txt || true
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          cd motion_ai
          pytest tests/ -v --tb=short --cov=src --cov=models --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: motion_ai/coverage.xml
          fail_ci_if_error: false

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./motion_ai
          file: ./motion_ai/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/motion-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit
          cd motion_ai
          bandit -r . -x ./tests --skip B101,B311 || true

      - name: Run Safety
        run: |
          pip install safety
          cd motion_ai
          safety check -r requirements.txt || true

  # Documentation
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme

      - name: Build docs
        run: |
          cd motion_ai
          mkdir -p docs_build
          # Copy markdown docs
          cp README.md docs_build/
          cp EVALUATION.md docs_build/
          echo "Documentation built successfully"

  # Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docs]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            motion_ai/README.md
            motion_ai/EVALUATION.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
