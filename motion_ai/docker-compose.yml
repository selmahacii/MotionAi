version: '3.8'

services:
  # Main API Service
  motion-api:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - LOG_LEVEL=info
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Development Service
  motion-api-dev:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - LOG_LEVEL=debug
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev

  # GPU-enabled Service
  motion-api-gpu:
    build:
      context: .
      target: gpu
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

  # Dashboard (Streamlit)
  motion-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://motion-api:8000
    depends_on:
      - motion-api
    profiles:
      - full

networks:
  default:
    name: motion-network

volumes:
  model-cache:
